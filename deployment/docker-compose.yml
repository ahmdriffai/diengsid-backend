services:
  api:
    image: ghcr.io/ahmdriffai/diengsid-backend:dev
    container_name: diengsid-api
    restart: always
    command: sh -c "apk add --no-cache tzdata && ./main"
    ports:
      - 9000:9000
    volumes:
      - ./config:/app/config
    networks:
      - diengsid-net
    depends_on:
      - database

  frontend:
    image: ghcr.io/ahmdriffai/diengsid-frontend:dev
    container_name: diengsid-frontend
    restart: always
    ports:
      - 5173:5173
    networks:
      - diengsid-net
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf

  cloudflared-api:
    image: cloudflare/cloudflared:latest
    container_name: diengsid-api-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token xxx
    networks:
      - diengsid-net

  cloudflared-panel:
    image: cloudflare/cloudflared:latest
    container_name: diengsid-panel-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token xxx
    networks:
      - diengsid-net

  database:
    image: postgres:15-alpine
    container_name: diengsid-database
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: db_diengsid
      TZ: Asia/Jakarta
    ports:
      - 5432:5432
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - diengsid-net

networks:
  diengsid-net:
    name: diengsid-net
    driver: bridge

volumes:
  database_data:
    name: database-data
